#
# LightDM configuration for Robot Kiosk Browser mode
#
# To activate: sudo ln -sf /etc/lightdm/lightdm.rbrowser.conf /etc/lightdm/lightdm.conf
#

[LightDM]

[Seat:*]
greeter-session=pi-greeter-labwc
greeter-hide-users=false
user-session=LXDE-pi-labwc
display-setup-script=/usr/share/dispsetup.sh
autologin-user=robot
autologin-session=LXDE-pi-labwc-rbrowser

[XDMCPServer]

[VNCServer]
